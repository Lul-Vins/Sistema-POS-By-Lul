<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block titulo %}POS{% endblock %} — {{ empresa.nombre|default:"POS Core" }}</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    /* ── Tipografía global ─────────────────────────────────── */
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 1.05rem;
      background-color: #f4f6f9;
    }

    /* ── Navbar ────────────────────────────────────────────── */
    .navbar-pos {
      background-color: #1a1a2e;
      min-height: 58px;
    }
    .navbar-pos .navbar-brand {
      font-size: 1.3rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.5px;
    }
    .navbar-pos .nav-link {
      color: #c8cdd8;
      font-size: 0.95rem;
    }
    .navbar-pos .nav-link:hover,
    .navbar-pos .nav-link.active {
      color: #ffffff;
    }
    .navbar-pos .tasa-badge {
      background-color: #2d6a4f;
      color: #fff;
      font-size: 0.85rem;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    /* ── Contenido principal ───────────────────────────────── */
    .content-wrapper {
      padding-top: 1.5rem;
      padding-bottom: 2rem;
    }
  </style>

  {% block estilos_extra %}{% endblock %}
</head>

<body>

  <!-- ══ NAVBAR ══════════════════════════════════════════════ -->
  <nav class="navbar navbar-expand-lg navbar-pos px-3">
    <a class="navbar-brand" href="{% url 'pos:venta' %}">
      <i class="bi bi-shop me-2"></i>{{ empresa.nombre|default:"POS Core" }}
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto ms-3 gap-1">
        <li class="nav-item">
          <a class="nav-link {% block nav_venta %}{% endblock %}" href="{% url 'pos:venta' %}">
            <i class="bi bi-cart3 me-1"></i>Venta
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% block nav_inventario %}{% endblock %}" href="#">
            <i class="bi bi-box-seam me-1"></i>Inventario
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% block nav_reportes %}{% endblock %}" href="#">
            <i class="bi bi-bar-chart-line me-1"></i>Reportes
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% block nav_config %}{% endblock %}" href="#">
            <i class="bi bi-gear me-1"></i>Configuración
          </a>
        </li>
      </ul>

      <!-- Tasa activa visible en todo momento -->
      {% if tasa %}
        <span class="tasa-badge me-3">
          <i class="bi bi-currency-dollar"></i>1 = Bs. {{ tasa }}
        </span>
      {% endif %}
    </div>
  </nav>
  <!-- ══ FIN NAVBAR ═══════════════════════════════════════════ -->

  <div class="content-wrapper container-fluid">
    {% block contenido %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts_extra %}{% endblock %}
</body>
</html>
